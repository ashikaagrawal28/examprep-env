name: examprep
version: "1.0.0"
description: Competitive exam preparation agent for Indian students
tasks:
  - name: easy
    difficulty: easy
    total_days: 30
  - name: medium
    difficulty: medium
    total_days: 60
  - name: hard
    difficulty: hard
    total_days: 90
endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
    entry_point: "examprep.server:app"
port: 8000